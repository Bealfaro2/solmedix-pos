<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sora', sans-serif; background-color: #f0f4f8; color: #1a202c; margin: 0; padding: 15px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .header { text-align: center; margin-bottom: 20px; }
    .logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #2b6cb0; margin-bottom: 10px; }
    h1 { color: #2b6cb0; font-size: 20px; margin: 5px 0; }
    .card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fff; }
    label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 5px; }
    input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
    .btn-scan { background: #ebf8ff; color: #2b6cb0; border: 2px dashed #2b6cb0; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .med-row { background: #f7fafc; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; border-left: 4px solid #2b6cb0; }
    .btn-send { background: #2f855a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn-send:hover { background: #276749; }
    .badge-especialidad { font-size: 10px; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; color: #4a5568; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <img src="https://i.ibb.co/hR0p5Lp/IBGD-Logo.jpg" class="logo" alt="IBGD">
    <h1>Día del Vecino - Abril 2026</h1>
    <p style="font-size: 13px; color: #718096;">Iglesia Bautista Gracia de Dios</p>
  </div>

  <div class="card">
    <label>1. DATOS DEL PACIENTE</label>
    <select id="selPaciente" onchange="checkPaciente(this.value)">
      <option value="">-- Seleccionar de la lista --</option>
      <option value="NUEVO" style="font-weight: bold; color: #2b6cb0;">+ REGISTRAR NUEVO</option>
    </select>
    
    <div id="formNuevo" style="display:none; border-top: 1px solid #edf2f7; pt: 10px;">
      <input type="text" id="pNombre" placeholder="Nombre completo *">
      <input type="text" id="pDir" placeholder="Dirección *">
      <input type="text" id="pTel" placeholder="WhatsApp / Teléfono *">
    </div>
  </div>

  <div class="card">
    <label>2. MEDICAMENTOS (USAR ESCÁNER)</label>
    <input type="text" id="barcodeInput" placeholder="Escanee el código aquí..." onkeypress="handleScan(event)" style="border-color: #2b6cb0;">
    <div id="listaMed"></div>
  </div>

  <div class="card">
    <label>3. MÉDICO QUE RECETÓ</label>
    <select id="selMedico">
      <option value="">-- Seleccione médico --</option>
    </select>
  </div>

  <button class="btn-send" onclick="finalizar()">Registrar Dispensación</button>
</div>

<script>
  let items = [];
  
  // Carga inicial
  window.onload = () => {
    google.script.run.withSuccessHandler(res => {
      const sp = document.getElementById('selPaciente');
      res.pacientes.forEach(p => sp.add(new Option(p.nombre, p.nombre)));
      
      const sm = document.getElementById('selMedico');
      res.medicos.forEach(m => sm.add(new Option(m.nombre + " (" + m.especialidad + ")", m.nombre)));
    }).obtenerCatalogos();
  };

  function checkPaciente(val) {
    document.getElementById('formNuevo').style.display = (val === 'NUEVO') ? 'block' : 'none';
  }

  function handleScan(e) {
    if (e.key === 'Enter') {
      const code = e.target.value;
      google.script.run.withSuccessHandler(res => {
        if (res) {
          items.push(res.descripcion);
          renderMed();
          e.target.value = '';
        } else {
          alert("Medicamento no registrado en la base de datos.");
          e.target.value = '';
        }
      }).buscarMedicamento(code);
    }
  }

  function renderMed() {
    const cont = document.getElementById('listaMed');
    cont.innerHTML = items.map(m => `<div class="med-row"><span>${m}</span><span onclick="this.parentElement.remove()" style="color:red;cursor:pointer">✕</span></div>`).join('');
  }

  function finalizar() {
    const selP = document.getElementById('selPaciente').value;
    const payload = {
      esNuevo: (selP === 'NUEVO'),
      pNombre: (selP === 'NUEVO') ? document.getElementById('pNombre').value : selP,
      pDir: document.getElementById('pDir').value,
      pTel: document.getElementById('pTel').value,
      medico: document.getElementById('selMedico').value,
      medicamentos: items
    };

    if (!payload.pNombre || !payload.medico || items.length === 0) {
      alert("Por favor complete Paciente, Médico y al menos un Medicamento.");
      return;
    }

    google.script.run.withSuccessHandler(msg => {
      alert(msg);
      location.reload();
    }).guardarRegistro(payload);
  }
</script>
</body>
</html>
