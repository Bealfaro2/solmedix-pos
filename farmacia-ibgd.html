<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día del Vecino - Farmacia IBGD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <img src="IBGD.jfif" alt="Logo" class="h-16" onerror="this.style.display='none'">
            <div>
                <h1 class="text-3xl font-bold">Día del Vecino - Farmacia</h1>
                <p class="text-blue-700">Abril 2026 • Iglesia Bautista Gracia de Dios</p>
            </div>
        </div>

        <button onclick="syncMedications()" 
                class="bg-emerald-600 text-white px-8 py-4 rounded-2xl text-lg font-medium mb-8">
            🔄 Sincronizar con Google Sheets
        </button>

        <div id="status" class="bg-white p-6 rounded-2xl shadow mb-8">
            <p><strong>Estado:</strong> <span id="status-text">Cargando...</span></p>
            <p class="mt-2"><strong>Medicamentos encontrados:</strong> <span id="count">0</span></p>
        </div>

        <button onclick="testConnection()" 
                class="bg-blue-600 text-white px-6 py-3 rounded-xl">
            Probar conexión con Apps Script
        </button>

        <pre id="debug" class="mt-8 bg-slate-900 text-green-400 p-4 rounded-xl text-sm overflow-auto max-h-96"></pre>
    </div>

    <script>
        const BASE_URL = "https://script.google.com/macros/s/AKfycby7ihnIDQ3hxTeldszc0gdpjUpVQMEZNgNYPjU1yazl6cFzQeVj47Mxyg_DItI06NDe/exec";

        async function syncMedications() {
            const status = document.getElementById('status-text');
            status.textContent = "Sincronizando...";
            
            try {
                const res = await fetch(BASE_URL + "?action=getAllMedications");
                const data = await res.json();
                
                document.getElementById('count').textContent = Array.isArray(data) ? data.length : 0;
                document.getElementById('debug').textContent = JSON.stringify(data, null, 2);
                
                if (data.length === 0) {
                    status.textContent = "✅ Conexión OK, pero no hay medicamentos en la hoja";
                } else {
                    status.textContent = `✅ ${data.length} medicamentos cargados correctamente`;
                }
            } catch (err) {
                status.textContent = "❌ Error de conexión";
                document.getElementById('debug').textContent = "Error: " + err.message;
            }
        }

        async function testConnection() {
            try {
                const res = await fetch(BASE_URL);
                const text = await res.text();
                document.getElementById('debug').textContent = "Respuesta del servidor:\n" + text;
            } catch (err) {
                document.getElementById('debug').textContent = "Error de conexión:\n" + err.message;
            }
        }

        // Iniciar automáticamente
        window.onload = () => {
            document.getElementById('status-text').textContent = "Listo - Presiona Sincronizar";
        };
    </script>
</body>
</html>
