<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Día del Vecino Abril 2026 - Farmacia IBGD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Playfair Display', sans-serif; }
        .nav-link.active { border-bottom: 4px solid #1e40af; color: #1e40af; font-weight: 600; }
        .scan-input { animation: scan-pulse 2s infinite; }
        @keyframes scan-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow: 0 0 0 15px rgba(16,185,129,0); } }
    </style>
</head>
<body class="bg-slate-50">

    <!-- HEADER -->
    <div class="bg-white shadow-sm sticky top-0 z-50 border-b">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <img src="IBGD.jfif" alt="Logo IBGD" class="h-14 w-auto object-contain" onerror="this.style.display='none';">
                <div>
                    <h1 class="header-font text-3xl font-bold text-slate-900">Día del Vecino</h1>
                    <p class="text-blue-900">Abril 2026 • Iglesia Bautista Gracia de Dios</p>
                </div>
            </div>
            <button onclick="syncMedications()" 
                    class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-3xl text-sm font-medium">
                <i class="fas fa-sync"></i> Sincronizar Sheets
            </button>
        </div>

        <!-- NAVEGACIÓN -->
        <div class="max-w-7xl mx-auto px-6 flex text-sm font-medium border-b bg-white overflow-x-auto">
            <button onclick="navigate(0)" id="tab-0" class="nav-link px-8 py-5 flex items-center gap-x-2"><i class="fas fa-user"></i> PACIENTES</button>
            <button onclick="navigate(1)" id="tab-1" class="nav-link px-8 py-5 flex items-center gap-x-2"><i class="fas fa-user-md"></i> MÉDICOS</button>
            <button onclick="navigate(2)" id="tab-2" class="nav-link px-8 py-5 flex items-center gap-x-2"><i class="fas fa-pills"></i> MEDICAMENTOS</button>
            <button onclick="navigate(3)" id="tab-3" class="nav-link active px-8 py-5 flex items-center gap-x-2 bg-blue-50 text-blue-700"><i class="fas fa-hand-holding-medical"></i> DISPENSACIÓN</button>
            <button onclick="navigate(4)" id="tab-4" class="nav-link px-8 py-5 flex items-center gap-x-2"><i class="fas fa-chart-bar"></i> REPORTES</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8">

        <!-- PANEL 1: MÉDICOS (ahora con funcionalidad) -->
        <div id="panel-1" class="tab-panel hidden">
            <div class="flex justify-between mb-6">
                <h2 class="text-2xl font-semibold">Médicos Colaboradores</h2>
                <button onclick="showDoctorForm()" class="bg-blue-900 text-white px-6 py-3 rounded-3xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nuevo Médico
                </button>
            </div>
            <div class="bg-white rounded-3xl shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50"><tr>
                        <th class="px-8 py-4 text-left">Nombre</th>
                        <th class="px-8 py-4 text-left">Especialidad</th>
                        <th class="px-8 py-4 text-left">Cédula</th>
                        <th class="px-8 py-4 text-left">WhatsApp</th>
                    </tr></thead>
                    <tbody id="doctors-table" class="divide-y"></tbody>
                </table>
            </div>
        </div>

        <!-- Las otras pestañas (Dispensación, etc.) se mantienen iguales. Puedes agregarlas si quieres el archivo completo. -->

    </div>

    <!-- Modal Nuevo Médico (nuevo y funcional) -->
    <div id="modal-doctor" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
            <h3 class="text-xl font-semibold mb-6">Nuevo Médico Colaborador</h3>
            <form onsubmit="saveDoctor(event)">
                <input id="d-nombre" required placeholder="Nombre completo del médico" class="w-full px-6 py-4 border rounded-3xl mb-4">
                
                <select id="d-especialidad" required class="w-full px-6 py-4 border rounded-3xl mb-4">
                    <option value="">Selecciona especialidad...</option>
                    <option value="PEDIATRÍA">PEDIATRÍA</option>
                    <option value="CARDIOLOGÍA">CARDIOLOGÍA</option>
                    <option value="PSICOLOGÍA">PSICOLOGÍA</option>
                    <option value="MEDICINA INTERNA">MEDICINA INTERNA</option>
                    <option value="CIRUGÍA GENERAL">CIRUGÍA GENERAL</option>
                    <option value="DENTISTA">DENTISTA</option>
                    <option value="OFTALMOLOGICA">OFTALMOLOGÍA</option>
                </select>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input id="d-cedula" required placeholder="Cédula Profesional" class="w-full px-6 py-4 border rounded-3xl">
                    <input id="d-rfc" placeholder="RFC (opcional)" class="w-full px-6 py-4 border rounded-3xl">
                </div>

                <input id="d-whatsapp" required placeholder="WhatsApp del médico" class="w-full px-6 py-4 border rounded-3xl mb-6">

                <div class="flex gap-3">
                    <button type="button" onclick="hideModals()" class="flex-1 py-4 border rounded-3xl">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-blue-900 text-white rounded-3xl">Guardar Médico</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ... (mantengo las variables y funciones anteriores)
        let doctors = [];

        function showDoctorForm() {
            document.getElementById('modal-doctor').classList.remove('hidden');
        }

        function hideModals() {
            document.getElementById('modal-patient').classList.add('hidden');
            document.getElementById('modal-doctor').classList.add('hidden');
        }

        function saveDoctor(e) {
            e.preventDefault();
            const doctor = {
                id: "D" + Date.now(),
                nombre: document.getElementById('d-nombre').value.trim(),
                especialidad: document.getElementById('d-especialidad').value,
                cedula: document.getElementById('d-cedula').value.trim(),
                rfc: document.getElementById('d-rfc').value.trim(),
                whatsapp: document.getElementById('d-whatsapp').value.trim()
            };

            if (!doctor.nombre || !doctor.especialidad || !doctor.cedula || !doctor.whatsapp) {
                return alert("Los campos Nombre, Especialidad, Cédula y WhatsApp son obligatorios");
            }

            doctors.push(doctor);
            localStorage.setItem('ibgd_doctors', JSON.stringify(doctors));
            alert("✅ Médico guardado correctamente");
            hideModals();
            // Puedes agregar renderDoctors() si quieres mostrar la lista
        }

        // Iniciar
        window.onload = async () => {
            // Cargar datos guardados
            patients = JSON.parse(localStorage.getItem('ibgd_patients') || '[]');
            doctors = JSON.parse(localStorage.getItem('ibgd_doctors') || '[]');
            
            await loadMedicationsFromSheets();
            navigate(3);
        };
    </script>
</body>
</html>
