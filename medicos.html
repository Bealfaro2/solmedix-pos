<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sora', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .form-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
    .logo { display: block; margin: 0 auto 20px; width: 80px; height: 80px; border-radius: 50%; }
    h2 { color: #1e293b; text-align: center; margin-bottom: 5px; font-size: 22px; }
    p { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 30px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 5px; text-transform: uppercase; }
    input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    button { background: #2563eb; color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    button:hover { background: #1d4ed8; }
    .success { display: none; text-align: center; color: #059669; font-weight: 600; }
  </style>
</head>
<body>

<div class="form-card" id="formContainer">
  <img src="https://i.ibb.co/hR0p5Lp/IBGD-Logo.jpg" class="logo">
  <h2>Registro de Médicos</h2>
  <p>Día del Vecino Abril 2026</p>

  <form id="medicoForm">
    <label>Nombre Completo</label>
    <input type="text" name="nombre" placeholder="Ej. Dr. Juan Pérez" required>

    <label>Área de Especialidad</label>
    <select name="especialidad" required>
      <option value="">Seleccione una área...</option>
      <option value="PEDIATRÍA">PEDIATRÍA</option>
      <option value="CARDIOLOGÍA">CARDIOLOGÍA</option>
      <option value="PSICOLOGÍA">PSICOLOGÍA</option>
      <option value="MEDICINA INTERNA">MEDICINA INTERNA</option>
      <option value="CIRUGÍA GENERAL">CIRUGÍA GENERAL</option>
      <option value="DENTISTA">DENTISTA</option>
      <option value="OFTALMOLOGICA">OFTALMOLOGICA</option>
    </select>

    <label>Cédula Profesional</label>
    <input type="text" name="cedula" placeholder="Número de cédula" required>

    <label>RFC</label>
    <input type="text" name="rfc" placeholder="RFC con homoclave" required>

    <label>WhatsApp</label>
    <input type="tel" name="whatsapp" placeholder="10 dígitos" required>

    <button type="submit" id="btnEnviar">Registrar Información</button>
  </form>
  
  <div id="msgExito" class="success">
    <p style="font-size: 40px;">✅</p>
    <p id="textoExito"></p>
    <button onclick="location.reload()" style="background:#64748b">Registrar otro</button>
  </div>
</div>

<script>
  const form = document.getElementById('medicoForm');
  const btn = document.getElementById('btnEnviar');

  form.onsubmit = (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.innerText = "Enviando...";

    const formData = {
      nombre: form.nombre.value,
      especialidad: form.especialidad.value,
      cedula: form.cedula.value,
      rfc: form.rfc.value,
      whatsapp: form.whatsapp.value
    };

    google.script.run
      .withSuccessHandler((msg) => {
        document.getElementById('medicoForm').style.display = 'none';
        document.getElementById('msgExito').style.display = 'block';
        document.getElementById('textoExito').innerText = msg;
      })
      .registrarMedicoNuevo(formData);
  };
</script>
</body>
</html>
