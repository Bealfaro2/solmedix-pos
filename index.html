<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solmedix — Sistema de Ventas</title>
<style>
:root {
  --primary: #185FA5;
  --primary-dark: #124a82;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family: 'Inter', -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text-main); min-height: 100vh; -webkit-font-smoothing: antialiased;}

/* PANTALLA SELECCIÓN SUCURSAL */
#pantalla-sucursal{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem;background: radial-gradient(circle at top right, #e2e8f0, #f8fafc);}
.suc-card{background: var(--card-bg); border-radius: 24px; border: 1px solid var(--border); padding: 3rem 2rem; width: 100%; max-width: 500px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);}
.suc-card img{max-width: 220px; margin: 0 auto 2rem; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));}
.suc-card h2{font-size: 24px; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; letter-spacing: -0.025em;}
.suc-card p{font-size: 15px; color: var(--text-muted); margin-bottom: 2.5rem;}

.suc-btns{display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;}
.suc-btn{background: #fff; border: 2px solid var(--border); border-radius: 16px; padding: 1.5rem 1rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; align-items: center; gap: 0.75rem;}
.suc-btn:hover{border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 12px 20px -8px rgba(24,95,165,0.25); color: var(--primary);}
.suc-btn i{font-size: 24px;}
.suc-btn span{font-weight: 600; font-size: 15px;}

/* PANEL PRINCIPAL */
#pantalla-ventas{display:none;}
nav{background: #fff; height: 80px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05);}
.nav-left{display: flex; align-items: center; gap: 1.5rem;}
.nav-right{display: flex; align-items: center; gap: 1.5rem;}
.suc-badge{background: #f1f5f9; padding: 0.5rem 1rem; border-radius: 999px; font-size: 13px; font-weight: 600; color: var(--primary); border: 1px solid #e2e8f0;}

.btn-exit{background: transparent; border: 1px solid var(--border); padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text-muted); transition: 0.2s;}
.btn-exit:hover{background: #fee2e2; color: #b91c1c; border-color: #fecaca;}

.main-content{max-width: 1200px; margin: 2.5rem auto; padding: 0 1.5rem;}
.search-container{position: relative; margin-bottom: 2.5rem;}
#input-busqueda{width: 100%; padding: 1.25rem 1.5rem; border-radius: 18px; border: 1px solid var(--border); font-size: 16px; transition: all 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); outline: none;}
#input-busqueda:focus{border-color: var(--primary); box-shadow: 0 0 0 4px rgba(24,95,165,0.1); background: #fff;}

.table-card{background: #fff; border-radius: 20px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);}
table{width: 100%; border-collapse: collapse; table-layout: fixed;}
th{background: #f8fafc; padding: 1rem 1.5rem; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border);}
td{padding: 1.25rem 1.5rem; font-size: 15px; border-bottom: 1px solid var(--border); vertical-align: middle;}

.stock-pill{display: inline-flex; align-items: center; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 12px; font-weight: 700;}
.price-tag{font-size: 18px; font-weight: 700; color: var(--primary); font-family: 'Monaco', monospace;}

.loader {
  width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--primary);
  border-radius: 50%; animation: spin 1s linear infinite; margin: 2rem auto;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="pantalla-sucursal">
  <div class="suc-card">
    <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" alt="Logo">
    <h2>Bienvenido al Sistema</h2>
    <p>Selecciona tu punto de venta para comenzar</p>
    <div class="suc-btns">
      <div class="suc-btn" onclick="selectSuc('Monterrey')">
        <span style="font-size:24px">🏙️</span>
        <span>Monterrey</span>
      </div>
      <div class="suc-btn" onclick="selectSuc('San Luis Potosí')">
        <span style="font-size:24px">🌵</span>
        <span>San Luis Potosí</span>
      </div>
    </div>
  </div>
</div>

<div id="pantalla-ventas">
  <nav>
    <div class="nav-left">
      <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" height="35" alt="Logo">
    </div>
    <div class="nav-right">
      <span class="suc-badge" id="badge-sucursal">Sucursal</span>
      <button class="btn-exit" onclick="location.reload()">Cerrar Sesión</button>
    </div>
  </nav>

  <div class="main-content">
    <div class="search-container">
      <input type="text" id="input-busqueda" placeholder="Buscar medicamento, componente o categoría..." onkeyup="filtrar()">
    </div>

    <div class="table-card">
      <div id="tabla-container">
        <div class="loader"></div>
        <p style="text-align:center; color:var(--text-muted); padding-bottom:2rem;">Sincronizando inventario en tiempo real...</p>
      </div>
    </div>
  </div>
</div>

<script>
/* MANTENEMOS TU LÓGICA ORIGINAL */
var api='https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';
var sucursal='';
var medicamentos=[];
var lotes=[];

window.onload=function(){
  var s=document.createElement('script');
  s.src=api+'?accion=medicamentos&callback=cbMeds';
  document.body.appendChild(s);
  var s2=document.createElement('script');
  s2.src=api+'?accion=lotes&callback=cbLotes';
  document.body.appendChild(s2);
};

function cbMeds(d){medicamentos=d.medicamentos; if(lotes.length>0 && sucursal!=='') renderVentas();}
function cbLotes(d){lotes=d.lotes; if(medicamentos.length>0 && sucursal!=='') renderVentas();}

function selectSuc(s){
  sucursal=s;
  document.getElementById('badge-sucursal').innerText='📍 ' + s;
  document.getElementById('pantalla-sucursal').style.display='none';
  document.getElementById('pantalla-ventas').style.display='block';
  if(medicamentos.length>0 && lotes.length>0) renderVentas();
}

function filtrar(){renderVentas();}

function renderVentas(){
  var q=document.getElementById('input-busqueda').value.toLowerCase();
  var src=medicamentos.filter(function(m){
    return m.nombre.toLowerCase().includes(q) || m.categoria.toLowerCase().includes(q);
  });

  var html='<table><thead><tr>';
  html+='<th style="width:45%">Medicamento</th>';
  html+='<th style="width:25%">Categoría</th>';
  html+='<th style="width:15%;text-align:right">Precio</th>';
  html+='<th style="width:15%;text-align:right">Stock</th>';
  html+='</tr></thead><tbody>';

  for(var i=0;i<src.length;i++){
    var m=src[i];
    var exTotal=0;
    for(var j=0;j<lotes.length;j++){
      if(String(lotes[j].med_id)===String(m.id) && lotes[j].sucursal===sucursal) exTotal+=Number(lotes[j].existencias);
    }
    
    var colorClass = exTotal > 5 ? 'background:#dcfce7;color:#166534' : exTotal > 0 ? 'background:#fef3c7;color:#92400e' : 'background:#fee2e2;color:#991b1b';
    var statusTxt = exTotal > 0 ? exTotal + ' unidades' : 'Agotado';

    html+='<tr>';
    html+='<td><div style="font-weight:600;color:var(--text-main)">'+m.nombre+'</div></td>';
    html+='<td><span style="color:var(--text-muted);font-size:13px">'+m.categoria+'</span></td>';
    html+='<td style="text-align:right"><span class="price-tag">$'+Number(m.precio).toLocaleString('es-MX',{minimumFractionDigits:2})+'</span></td>';
    html+='<td style="text-align:right"><span class="stock-pill" style="'+colorClass+'">'+statusTxt+'</span></td>';
    html+='</tr>';
  }
  html+='</tbody></table>';
  document.getElementById('tabla-container').innerHTML=html;
}
</script>
</body>
</html>
