<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solmedix — Administración</title>
<style>
  /* Mantengo tus estilos originales y agrego mejoras para los nuevos campos */
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ee;min-height:100vh}
  .container{max-width:1100px;margin:0 auto;padding:2rem 1rem}
  .card{background:#fff;border-radius:12px;border:1px solid #e5e3dc;padding:1.5rem;margin-bottom:1.5rem}
  .grid-fiscal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-top:10px;background:#f9f9f7;padding:15px;border-radius:8px;border:1px dashed #ccc}
  table{width:100%;border-collapse:collapse;margin-top:1rem}
  th{text-align:left;padding:12px;background:#f9f9f7;font-size:13px;color:#666;border-bottom:1px solid #eee}
  td{padding:12px;border-bottom:1px solid #eee;font-size:14px}
  .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:500;transition:0.2s}
  .btn-primary{background:#185FA5;color:#fff}
  .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;padding:2rem;border-radius:16px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
  .form-group{margin-bottom:1rem}
  .form-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
  .form-group input, .form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px}
  .badge-sat{font-size:10px;background:#e2e8f0;padding:2px 6px;border-radius:4px;color:#475569;display:block;margin-top:4px}
</style>
</head>
<body>

<div id="app">
  <div class="container">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2>Catálogo de Medicamentos</h2>
        <button class="btn btn-primary" onclick="abrirModalMed()">+ Nuevo Producto</button>
      </div>
      <div id="lista-meds">
        </div>
    </div>
  </div>
</div>

<div id="modal-med-overlay" class="modal-overlay" onclick="cerrarModalExterno(event, 'modal-med-overlay')">
  <div class="modal">
    <h3 id="med-titulo">Nuevo Medicamento</h3>
    <input type="hidden" id="med-id">
    
    <div class="form-group">
      <label>Nombre Comercial / Genérico</label>
      <input type="text" id="med-nombre">
    </div>
    
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
      <div class="form-group">
        <label>Categoría</label>
        <select id="med-cat">
          <option value="Patente">Patente</option>
          <option value="Genérico">Genérico</option>
          <option value="Abarrotes">Abarrotes</option>
          <option value="Servicios">Servicios</option>
        </select>
      </div>
      <div class="form-group">
        <label>Precio de Venta</label>
        <input type="number" id="med-precio" step="0.01">
      </div>
    </div>

    <div class="form-group">
      <label>Código de Barras</label>
      <input type="text" id="med-barras">
    </div>

    <div class="form-group">
      <label>¿Requiere Receta?</label>
      <select id="med-receta">
        <option value="NO">No</option>
        <option value="SI">Sí</option>
      </select>
    </div>

    <p style="font-size:12px; font-weight:bold; color:#185FA5; margin-top:15px;">DATOS FISCALES (SAT)</p>
    <div class="grid-fiscal">
      <div class="form-group">
        <label>Tipo</label>
        <input type="text" id="med-sat-tipo" value="Unidad">
      </div>
      <div class="form-group">
        <label>Clave Producto</label>
        <input type="text" id="med-sat-prod" placeholder="Ej: 51101500">
        <span class="badge-sat">Medicamentos: 51101500</span>
      </div>
      <div class="form-group">
        <label>Clave Unidad</label>
        <input type="text" id="med-sat-unidad" value="H87">
        <span class="badge-sat">Pieza: H87</span>
      </div>
    </div>

    <div style="margin-top:20px; display:flex; gap:10px">
      <button class="btn btn-primary" id="btn-guardar-med" onclick="guardarMed()">Guardar Producto</button>
      <button class="btn" onclick="cerrarModalMed()">Cancelar</button>
    </div>
  </div>
</div>

<script>
// Lógica de carga y guardado (adaptada de tu código original)
var medicamentos = [];

function abrirModalMed(id = null) {
  if(id) {
    const m = medicamentos.find(x => x.id === id);
    document.getElementById('med-titulo').innerText = "Editar Producto";
    document.getElementById('med-id').value = m.id;
    document.getElementById('med-nombre').value = m.nombre;
    document.getElementById('med-cat').value = m.categoria;
    document.getElementById('med-precio').value = m.precio;
    document.getElementById('med-barras').value = m.codigo_barras;
    document.getElementById('med-receta').value = m.receta;
    document.getElementById('med-sat-tipo').value = m.tipo_producto || 'Unidad';
    document.getElementById('med-sat-prod').value = m.sat_prod || '';
    document.getElementById('med-sat-unidad').value = m.sat_unidad || 'H87';
  } else {
    document.getElementById('med-titulo').innerText = "Nuevo Producto";
    document.getElementById('med-id').value = "";
    document.getElementById('med-nombre').value = "";
    document.getElementById('med-sat-prod').value = "51101500"; // Default Medicamentos
  }
  document.getElementById('modal-med-overlay').classList.add('show');
}

function guardarMed() {
  const data = {
    accion: document.getElementById('med-id').value ? 'editar_medicamento' : 'guardar_medicamento',
    id: document.getElementById('med-id').value,
    nombre: document.getElementById('med-nombre').value,
    categoria: document.getElementById('med-cat').value,
    precio: document.getElementById('med-precio').value,
    codigo_barras: document.getElementById('med-barras').value,
    receta: document.getElementById('med-receta').value,
    tipo_producto: document.getElementById('med-sat-tipo').value,
    sat_prod: document.getElementById('med-sat-prod').value,
    sat_unidad: document.getElementById('med-sat-unidad').value
  };

  // Aquí llamarías a tu función apiPost original
  console.log("Enviando datos:", data);
  // apiPost(data, function(res) { ... });
}

function cerrarModalMed() {
  document.getElementById('modal-med-overlay').classList.remove('show');
}
</script>
</body>
</html>
