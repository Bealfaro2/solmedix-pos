<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solmedix — Administración</title>
<style>
/* MANTENEMOS TU DISEÑO ORIGINAL COMPLETO */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ee;min-height:100vh}
#pantalla-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.login-card{background:#fff;border-radius:16px;border:1px solid #e5e3dc;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-card h2{font-size:18px;font-weight:500;margin-bottom:.4rem;color:#1a1a1a}
.login-card p{font-size:13px;color:#888;margin-bottom:1.5rem}
input, select{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-bottom:10px;font-size:15px}

/* Estilos de tu panel original */
#pantalla-admin{display:none}
.nav-admin{background:#fff;border-bottom:1px solid #e5e3dc;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.container{max-width:1100px;margin:2rem auto;padding:0 1rem}
.card{background:#fff;border-radius:12px;border:1px solid #e5e3dc;padding:1.5rem;margin-bottom:1.5rem}
table{width:100%;border-collapse:collapse}
th, td{text-align:left;padding:12px;border-bottom:1px solid #eee;font-size:14px}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:500;font-size:13px;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:#185FA5;color:#fff}
.sat-tag{display:inline-block;background:#f0f7ff;color:#185FA5;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold}
</style>
</head>
<body>

<div id="pantalla-login">
  <div class="login-card">
    <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" style="max-width:180px;margin-bottom:1.5rem" alt="Solmedix">
    <h2>Panel Administrativo</h2>
    <p>Ingresa tus credenciales para continuar</p>
    
    <select id="user-select">
        <option value="pwd_admin">Administrador Global</option>
        <option value="pwd_mty">Sucursal Monterrey</option>
        <option value="pwd_slp">Sucursal San Luis Potosí</option>
    </select>
    
    <input type="password" id="login-pwd" placeholder="Contraseña">
    <button class="btn btn-primary" style="width:100%;padding:12px" onclick="intentarLogin()">Acceder al Sistema</button>
    <p id="login-err" style="color:#c00;margin-top:10px;display:none">Contraseña incorrecta</p>
  </div>
</div>

<div id="pantalla-admin">
  <nav class="nav-admin">
    <div style="display:flex;align-items:center;gap:1rem">
      <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" height="30" alt="Solmedix">
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
      <span id="user-label" style="font-size:13px;font-weight:600"></span>
      <button class="btn" onclick="location.reload()">Salir</button>
    </div>
  </nav>

  <div class="container">
    <div class="card">
        <h3>Inventario y Catálogo</h3>
        <div id="contenido-datos">Cargando información...</div>
    </div>
  </div>
</div>

<script>
// CONEXIÓN CORREGIDA
var url_api = 'https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';
var configGlobal = {};

window.onload = function() {
    var s = document.createElement('script');
    s.src = url_api + '?accion=config&callback=cargarConfig';
    document.body.appendChild(s);
};

function cargarConfig(data) {
    configGlobal = data.config;
}

function intentarLogin() {
    var userKey = document.getElementById('user-select').value;
    var pwd = document.getElementById('login-pwd').value;
    
    if(pwd === configGlobal[userKey]) {
        document.getElementById('pantalla-login').style.display = 'none';
        document.getElementById('pantalla-admin').style.display = 'block';
        document.getElementById('user-label').innerText = document.getElementById('user-select').options[document.getElementById('user-select').selectedIndex].text;
        cargarMedicamentos();
    } else {
        document.getElementById('login-err').style.display = 'block';
    }
}

function cargarMedicamentos() {
    var s = document.createElement('script');
    s.src = url_api + '?accion=medicamentos&callback=renderTabla';
    document.body.appendChild(s);
}

function renderTabla(data) {
    var html = '<table><thead><tr><th>Medicamento</th><th>Precio</th><th>SAT</th></tr></thead><tbody>';
    data.medicamentos.forEach(function(m) {
        html += '<tr>' +
            '<td><b>' + m.nombre + '</b><br><small>' + m.categoria + '</small></td>' +
            '<td>$' + m.precio + '</td>' +
            '<td><span class="sat-tag">' + (m.sat_prod || '51101500') + '</span></td>' +
            '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('contenido-datos').innerHTML = html;
}
</script>
</body>
</html>
