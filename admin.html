<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solmedix — Administración</title>
    <style>
        /* ESTILOS REFINADOS */
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f3ee;min-height:100vh}
        
        #pantalla-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
        .login-card{background:#fff;border-radius:16px;border:1px solid #e5e3dc;padding:2.5rem 2rem;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
        .login-card h2{font-size:18px;font-weight:600;margin-bottom:1.5rem;color:#1a1a1a}
        
        select, input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none}
        
        #pantalla-admin{display:none}
        .nav-admin{background:#fff;border-bottom:1px solid #e5e3dc;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
        
        .container{max-width:1100px;margin:2rem auto;padding:0 1rem}
        .card{background:#fff;border-radius:12px;border:1px solid #e5e3dc;padding:1.5rem;margin-bottom:1.5rem}
        
        table{width:100%;border-collapse:collapse;margin-top:1rem}
        th{text-align:left;padding:12px;background:#f9f9f7;font-size:12px;color:#666;text-transform:uppercase;border-bottom:1px solid #eee}
        td{padding:12px;border-bottom:1px solid #eee;font-size:14px}

        .btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:14px;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
        .btn-primary{background:#185FA5;color:#fff}
        .btn-outline{background:#fff;border:1px solid #ddd;color:#666}

        .sat-tag{display:inline-block;background:#f0f7ff;color:#185FA5;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:bold;margin-top:4px}
    </style>
</head>
<body>

<div id="pantalla-login">
    <div class="login-card">
        <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" style="max-width:180px;margin-bottom:1.5rem">
        <h2>Panel Administrativo</h2>
        
        <label style="display:block;text-align:left;font-size:12px;color:#666;margin-bottom:5px">Selecciona Usuario</label>
        <select id="user-select">
            <option value="pwd_admin">Administrador Global</option>
            <option value="pwd_mty">Sucursal Monterrey</option>
            <option value="pwd_slp">Sucursal San Luis Potosí</option>
        </select>

        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn btn-primary" style="width:100%" onclick="login()">Acceder</button>
        <p id="err" style="color:#c00;font-size:13px;margin-top:12px;display:none">Contraseña incorrecta</p>
    </div>
</div>

<div id="pantalla-admin">
    <nav class="nav-admin">
        <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" height="30">
        <div style="display:flex;align-items:center;gap:1rem">
            <span id="label-user" style="font-size:13px;font-weight:bold;color:#666"></span>
            <button class="btn btn-outline" onclick="location.reload()">Salir</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h3>Catálogo de Medicamentos y Datos SAT</h3>
            <div id="tabla-meds">Cargando datos...</div>
        </div>
    </div>
</div>

<script>
    var api = 'https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';
    var configData = {};

    // Al cargar, intentamos traer la config para validar contraseñas
    window.onload = function() {
        var s = document.createElement('script');
        s.src = api + '?accion=config&callback=setWebConfig';
        document.body.appendChild(s);
    };

    function setWebConfig(data) {
        configData = data.config;
    }

    function login() {
        var userKey = document.getElementById('user-select').value;
        var passInput = document.getElementById('pass').value;
        var errorTxt = document.getElementById('err');

        if (passInput === configData[userKey]) {
            document.getElementById('pantalla-login').style.display = 'none';
            document.getElementById('pantalla-admin').style.display = 'block';
            document.getElementById('label-user').innerText = "Usuario: " + document.getElementById('user-select').options[document.getElementById('user-select').selectedIndex].text;
            cargarDatos();
        } else {
            errorTxt.style.display = 'block';
        }
    }

    function cargarDatos() {
        var s = document.createElement('script');
        s.src = api + '?accion=medicamentos&callback=renderMeds';
        document.body.appendChild(s);
    }

    function renderMeds(data) {
        var html = '<table><thead><tr><th>Nombre del Medicamento</th><th>Precio</th><th>Información SAT</th></tr></thead><tbody>';
        data.medicamentos.forEach(function(m) {
            html += `<tr>
                <td><b>${m.nombre}</b><br><small style="color:#888">${m.categoria}</small></td>
                <td style="font-weight:bold;color:#185FA5">$${m.precio}</td>
                <td>
                    <div class="sat-tag">CLAVE: ${m.sat_prod || '51101500'}</div><br>
                    <div class="sat-tag">UNIDAD: ${m.sat_unidad || 'H87'}</div>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('tabla-meds').innerHTML = html;
    }
</script>

</body>
</html>
