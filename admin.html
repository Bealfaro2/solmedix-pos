<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solmedix — Administración</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,sans-serif;background:#f4f3ee;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .card{background:#fff;padding:2.5rem;border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.05);text-align:center;width:100%;max-width:350px;border:1px solid #e5e3dc}
        input{width:100%;padding:12px;margin:15px 0;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:16px}
        button{width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
        #panel{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#f4f3ee;padding:20px;text-align:left}
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" width="180" style="margin-bottom:1rem">
        <h2 style="font-size:18px">Panel de Control</h2>
        <input type="password" id="pass" placeholder="Contraseña">
        <button id="btn" onclick="conectar()">Entrar</button>
        <p id="err" style="color:red;display:none;font-size:12px;margin-top:10px">Acceso denegado</p>
    </div>

    <div id="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;background:#fff;padding:15px;border-radius:10px;border:1px solid #e5e3dc">
            <h2 id="suc-name">Cargando sucursal...</h2>
            <button onclick="location.reload()" style="width:auto;padding:5px 15px;background:#666">Cerrar Sesión</button>
        </div>
        <div id="data-table" style="margin-top:20px;background:#fff;padding:20px;border-radius:10px;border:1px solid #e5e3dc">
            Cargando datos de Google Sheets...
        </div>
    </div>

    <script>
        var api = 'https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';
        
        function conectar() {
            document.getElementById('btn').innerText = "Verificando...";
            var s = document.createElement('script');
            s.src = api + '?accion=config&callback=resLogin';
            document.body.appendChild(s);
        }

        function resLogin(d) {
            var p = document.getElementById('pass').value;
            var suc = "";
            if(p === d.config.pwd_admin) suc = "Administrador";
            else if(p === d.config.pwd_mty) suc = "Monterrey";
            else if(p === d.config.pwd_slp) suc = "San Luis Potosí";

            if(suc) {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                document.getElementById('suc-name').innerText = "Sucursal: " + suc;
                var s = document.createElement('script');
                s.src = api + '?accion=medicamentos&callback=resMeds';
                document.body.appendChild(s);
            } else {
                document.getElementById('err').style.display = 'block';
                document.getElementById('btn').innerText = "Entrar";
            }
        }

        function resMeds(d) {
            var html = '<table style="width:100%;border-collapse:collapse"><thead><tr style="text-align:left;color:#666;font-size:12px"><th>PRODUCTO</th><th>PRECIO</th><th>SAT</th></tr></thead><tbody>';
            d.medicamentos.forEach(function(m){
                html += '<tr style="border-bottom:1px solid #eee"><td style="padding:10px 0"><b>'+m.nombre+'</b></td><td>$'+m.precio+'</td><td style="font-size:11px">P:'+(m.sat_prod||'--')+'<br>U:'+(m.sat_unidad||'H87')+'</td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('data-table').innerHTML = html;
        }
    </script>
</body>
</html>
