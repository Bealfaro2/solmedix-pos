<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Solmedix — Diagnóstico</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f3ee; }
        .box { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #185FA5; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #log { margin-top: 20px; color: #666; font-size: 12px; }
    </style>
</head>
<body>

    <div class="box">
        <img src="https://raw.githubusercontent.com/Bealfaro2/solmedix-pos/main/logo_solmedix.png" width="150">
        <h2>Control de Acceso</h2>
        <p>Si ves esto, el archivo HTML cargó correctamente.</p>
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="testConexion()">Probar Conexión</button>
        <div id="log">Esperando acción...</div>
    </div>

    <script>
        var url = 'https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';

        function testConexion() {
            document.getElementById('log').innerHTML = "Conectando con Google Sheets...";
            
            // Intentamos llamar a la configuración
            var script = document.createElement('script');
            script.src = url + '?accion=config&callback=resultado';
            document.body.appendChild(script);
            
            // Si en 8 segundos no pasa nada
            setTimeout(function() {
                if(document.getElementById('log').innerHTML.includes("Conectando")) {
                    document.getElementById('log').innerHTML = "<b style='color:red'>ERROR: Google no responde.</b><br>Verifica que el Apps Script esté publicado como 'Cualquier persona'.";
                }
            }, 8000);
        }

        function resultado(data) {
            var p = document.getElementById('pass').value;
            if(p === data.config.pwd_admin || p === data.config.pwd_mty || p === data.config.pwd_slp) {
                document.getElementById('log').innerHTML = "<b style='color:green'>¡ÉXITO! Conexión y contraseña correctas.</b>";
                alert("Conexión exitosa. Ahora ya podemos cargar el panel completo.");
            } else {
                document.getElementById('log').innerHTML = "<b style='color:orange'>Conectado a Google, pero contraseña incorrecta.</b>";
            }
        }
    </script>
</body>
</html>
