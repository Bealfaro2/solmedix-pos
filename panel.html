<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Solmedix Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f4f3ee; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #185FA5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-box" class="card">
        <h2>Panel Solmedix</h2>
        <p style="font-size: 13px; color: #666;">Introduce contraseña para conectar con Google Sheets</p>
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="conectar()">Entrar al Sistema</button>
        <p id="msg" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

    <script>
        var api = 'https://script.google.com/macros/s/AKfycbyCRC2nLoBybekYy0THrABObIGAZ4oPiM1Y0NwT1N0gQNBwU77nsCziB3p9n2RrRvyZ/exec';

        function conectar() {
            document.getElementById('msg').innerText = "Conectando...";
            var s = document.createElement('script');
            s.src = api + '?accion=config&callback=respuesta';
            document.body.appendChild(s);
        }

        function respuesta(data) {
            var p = document.getElementById('pass').value;
            if(p === data.config.pwd_admin || p === data.config.pwd_mty || p === data.config.pwd_slp) {
                alert("¡CONEXIÓN EXITOSA!");
                document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>Conectado a Google Sheets</h1>";
            } else {
                document.getElementById('msg').innerText = "Contraseña incorrecta";
                document.getElementById('msg').style.color = "red";
            }
        }
    </script>
</body>
</html>
